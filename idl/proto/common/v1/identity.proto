syntax = "proto3";

package common.v1;

enum IdentityType {
    IDENTITY_TYPE_UNSPECIFIED = 0;
    IDENTITY_TYPE_USER = 1;
    IDENTITY_TYPE_SYSTEM = 2;
}

message Identity {

    //Indicates the type of the creator (User or System)
    IdentityType type = 1;

    // Contains details of the creator, either user or system
    oneof details {
        UserActor user = 2;
        SystemActor system = 3;
    }
}
// =========================
// User Creator
// =========================

message UserActor {
    // Spiffe/Spite workload identity or global management system id
    string user_id = 1;
    string user_ldap = 2;
    bool is_service_account = 3;
}


// =========================
// System Creator
// =========================
message SystemActor {
    // Spiffe/Spite workload identity or global management system id
    string system_id  = 1;
    string system_name = 2;
    string system_environment = 3;
    optional UserActor federated_user = 4;
}
